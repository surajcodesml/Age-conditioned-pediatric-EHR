# Local Synthea overrides for the age-conditioned pediatric EHR study.
# Loaded via `run_synthea -c`, merged over the engine's embedded defaults.

# Write CSVs into the project repo (not the engine repo), single flat folder.
exporter.baseDirectory = /home/suraj/Git/Age-conditioned-pediatric-EHR/synthea/output/
exporter.csv.export = true
exporter.csv.folder_per_run = false
exporter.csv.append_mode = false
exporter.csv.included_files = patients,encounters,conditions,medications,procedures,observations

# CRITICAL: keep the FULL longitudinal record. The default (10) truncates early
# childhood events for older patients and would flatten onset-age structure.
exporter.years_of_history = 0

# Disable FHIR/other exporters we do not consume (faster, smaller).
exporter.fhir.export = false
exporter.fhir_stu3.export = false
exporter.fhir_dstu2.export = false
exporter.text.export = false
exporter.cpcds.export = false
exporter.cdw.export = false

# Keep deceased patients too (still valid longitudinal trajectories).
generate.only_alive_patients = false
